<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>💖 Be My Valentine? 💖</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* Global Styles */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Quicksand", sans-serif;
        background: linear-gradient(
          135deg,
          #ffeef8 0%,
          #ffe0f0 50%,
          #ffd4e5 100%
        );
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow-x: hidden;
        position: relative;
      }

      /* Floating Hearts Background Animation */
      .heart-bg {
        position: fixed;
        top: -10%;
        left: -10%;
        width: 120%;
        height: 120%;
        pointer-events: none;
        z-index: 0;
      }

      .floating-heart {
        position: absolute;
        font-size: 30px;
        opacity: 0.3;
        animation: float 15s infinite ease-in-out;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0) rotate(0deg);
        }
        50% {
          transform: translateY(-50px) rotate(10deg);
        }
      }

      /* Main Container */
      .valentine-container {
        position: relative;
        z-index: 1;
        text-align: center;
        padding: 30px;
        max-width: 600px;
        width: 100%;
      }

      /* Card Styling */
      .valentine-card {
        background: rgba(255, 255, 255, 0.95);
        border-radius: 30px;
        padding: 40px 30px;
        box-shadow: 0 20px 60px rgba(255, 105, 180, 0.3);
        backdrop-filter: blur(10px);
        border: 3px solid #ffb3d9;
        transition: transform 0.3s ease;
      }

      .valentine-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 25px 70px rgba(255, 105, 180, 0.4);
      }

      /* Image Container */
      .image-container {
        margin-bottom: 30px;
        position: relative;
      }

      .valentine-image {
        width: 100%;
        max-width: 300px;
        height: 300px;
        object-fit: cover;
        border-radius: 20px;
        border: 5px solid #ff69b4;
        box-shadow: 0 10px 30px rgba(255, 105, 180, 0.3);
        transition: all 0.5s ease;
        animation: fadeIn 0.5s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: scale(0.8);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      /* Question Text */
      .question-text {
        font-family: "Pacifico", cursive;
        font-size: 2rem;
        color: #e91e63;
        margin: 25px 0;
        text-shadow: 2px 2px 4px rgba(255, 105, 180, 0.3);
        animation: bounce 2s infinite;
      }

      @keyframes bounce {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }

      .response-text {
        font-size: 1.8rem;
        font-weight: 700;
        color: #d81b60;
        margin: 20px 0;
        animation: scaleIn 0.5s ease;
      }

      @keyframes scaleIn {
        from {
          transform: scale(0);
        }
        to {
          transform: scale(1);
        }
      }

      /* Button Container */
      .button-container {
        display: flex;
        gap: 20px;
        justify-content: center;
        align-items: center;
        margin-top: 30px;
        flex-wrap: wrap;
      }

      /* YES Button */
      .btn-yes {
        background: linear-gradient(135deg, #ff6b9d 0%, #c9184a 100%);
        color: white;
        border: none;
        padding: 18px 50px;
        font-size: 1.4rem;
        font-weight: 700;
        border-radius: 50px;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 8px 20px rgba(255, 107, 157, 0.4);
        text-transform: uppercase;
        letter-spacing: 2px;
      }

      .btn-yes:hover {
        transform: scale(1.1) rotate(-2deg);
        box-shadow: 0 12px 30px rgba(255, 107, 157, 0.6);
        background: linear-gradient(135deg, #ff5a8d 0%, #b01040 100%);
      }

      .btn-yes:active {
        transform: scale(0.95);
      }

      /* NO Button */
      .btn-no {
        background: linear-gradient(135deg, #ffd1dc 0%, #ffb3c1 100%);
        color: #c9184a;
        border: 2px solid #ffb3c1;
        padding: 18px 50px;
        font-size: 1.4rem;
        font-weight: 600;
        border-radius: 50px;
        cursor: pointer;
        transition: all 0.4s ease;
        box-shadow: 0 5px 15px rgba(255, 179, 193, 0.4);
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .btn-no:hover {
        transform: scale(1.05);
        background: linear-gradient(135deg, #ffc0cb 0%, #ffa0b0 100%);
      }

      .btn-no:active {
        transform: scale(0.9);
      }

      /* Confetti Animation */
      .confetti {
        position: fixed;
        width: 10px;
        height: 10px;
        background: #ff69b4;
        position: absolute;
        animation: confetti-fall 3s linear;
      }

      @keyframes confetti-fall {
        to {
          transform: translateY(100vh) rotate(360deg);
          opacity: 0;
        }
      }

      /* Success Message */
      .success-container {
        display: none;
      }

      .success-container.show {
        display: block;
        animation: zoomIn 0.6s ease;
      }

      @keyframes zoomIn {
        from {
          transform: scale(0) rotate(-180deg);
          opacity: 0;
        }
        to {
          transform: scale(1) rotate(0);
          opacity: 1;
        }
      }

      /* Responsive Design */
      @media (max-width: 576px) {
        .valentine-card {
          padding: 25px 20px;
        }

        .question-text {
          font-size: 1.5rem;
        }

        .response-text {
          font-size: 1.4rem;
        }

        .btn-yes,
        .btn-no {
          padding: 15px 35px;
          font-size: 1.1rem;
        }

        .valentine-image {
          max-width: 250px;
          height: 250px;
        }

        .button-container {
          gap: 15px;
        }
      }

      /* Hidden class */
      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <!-- Floating Hearts Background -->
    <div class="heart-bg">
      <div class="floating-heart" style="left: 10%; top: 20%">💕</div>
      <div
        class="floating-heart"
        style="left: 80%; top: 30%; animation-delay: 2s"
      >
        💖
      </div>
      <div
        class="floating-heart"
        style="left: 15%; top: 70%; animation-delay: 4s"
      >
        💗
      </div>
      <div
        class="floating-heart"
        style="left: 70%; top: 60%; animation-delay: 1s"
      >
        💝
      </div>
      <div
        class="floating-heart"
        style="left: 40%; top: 80%; animation-delay: 3s"
      >
        💘
      </div>
      <div
        class="floating-heart"
        style="left: 60%; top: 15%; animation-delay: 5s"
      >
        💓
      </div>
    </div>

    <!-- Main Container -->
    <div class="valentine-container">
      <div class="valentine-card">
        <!-- Initial Proposal View -->
        <div id="proposalView">
          <!-- Image Container -->
          <div class="image-container">
            <img
              id="valentineImage"
              src="img/1.jpg"
              alt="Valentine"
              class="valentine-image"
            />
          </div>

          <!-- Question Text -->
          <h1 class="question-text" id="questionText">
            Will you be my Valentines? 💖
          </h1>

          <!-- Buttons -->
          <div class="button-container">
            <button class="btn-yes" id="yesBtn">YES! 💕</button>
            <button class="btn-no" id="noBtn">No...</button>
          </div>
        </div>

        <!-- Success View (Hidden Initially) -->
        <div id="successView" class="success-container">
          <div class="image-container">
            <img
              id="successImage"
              src="img/7.jpg"
              alt="Happy Valentine"
              class="valentine-image"
            />
          </div>
          <h1 class="response-text">YAY! I KNEW IT! 💘🥰</h1>
          <p
            style="
              font-size: 1.2rem;
              color: #d81b60;
              margin-top: 15px;
              font-weight: 600;
            "
          >
            You just made me the happiest person ever! 💑✨
          </p>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      // ========================================
      // VALENTINE PROPOSAL INTERACTIVE SCRIPT
      // ========================================

      // Image URLs for different states
      const images = {
        default: "img/2.jpg",
        no1: "img/2.jpg", // Sad cat
        no2: "img/3.gif", // Pleading dog
        no3: "img/3.jpg", // Puppy eyes
        no4: "img/4.gif", // Sad dog
        no5: "img/5.jpg", // Crying face
        no5: "img/6.jpg", // Crying face
        yes: "img/7.jpg", // Happy celebration
      };

      // Messages for different NO clicks
      const noMessages = [
        "WILL YOU BE MY VALENTINE? 💖",
        "Are you sure? 🥺",
        "Please? Pretty please? 🙏💕",
        "Just give me a chance! 💔",
        "I'll be really sad... 😢",
        "My heart is breaking... 💔😭",
      ];

      // Get DOM elements
      const yesBtn = document.getElementById("yesBtn");
      const noBtn = document.getElementById("noBtn");
      const valentineImage = document.getElementById("valentineImage");
      const questionText = document.getElementById("questionText");
      const proposalView = document.getElementById("proposalView");
      const successView = document.getElementById("successView");

      // Track NO button clicks
      let noClickCount = 0;
      let currentSize = 100; // Initial button size percentage

      // ========================================
      // NO BUTTON CLICK HANDLER
      // ========================================
      noBtn.addEventListener("click", function () {
        noClickCount++;
        // Change image based on click count
        if (noClickCount === 1) {
          valentineImage.src = images.no1;
        } else if (noClickCount === 2) {
          valentineImage.src = images.no2;
        } else if (noClickCount === 3) {
          valentineImage.src = images.no3;
        } else if (noClickCount === 4) {
          valentineImage.src = images.no4;
        } else if (noClickCount >= 5) {
          valentineImage.src = images.no5;
        } else if (noClickCount >= 6) {
          valentineImage.src = images.no6;
        }
        // Change question text
        if (noClickCount < noMessages.length) {
          questionText.textContent = noMessages[noClickCount];
        }

        // Shrink the NO button
        currentSize -= 15;
        if (currentSize < 30) currentSize = 30; // Minimum size

        noBtn.style.transform = `scale(${currentSize / 100})`;

        // After 6 clicks, disable the button
        if (noClickCount >= 6) {
          noBtn.disabled = true;
          noBtn.style.opacity = "0.3";
          noBtn.style.cursor = "not-allowed";
          noBtn.textContent = "😢";
          questionText.textContent = "Okay... I understand... 💔😭";
        }
      });

      // ========================================
      // YES BUTTON CLICK HANDLER
      // ========================================
      yesBtn.addEventListener("click", function () {
        // Hide proposal view
        proposalView.classList.add("hidden");

        // Show success view
        successView.classList.add("show");

        // Create confetti effect
        createConfetti();

        // Play celebration animation
        celebrateSuccess();
      });

      // ========================================
      // CONFETTI ANIMATION
      // ========================================
      function createConfetti() {
        const colors = ["#ff69b4", "#ff1493", "#ff6b9d", "#ffb3d9", "#ff85c1"];
        const confettiCount = 100;

        for (let i = 0; i < confettiCount; i++) {
          setTimeout(() => {
            const confetti = document.createElement("div");
            confetti.className = "confetti";
            confetti.style.left = Math.random() * 100 + "%";
            confetti.style.top = "-10px";
            confetti.style.background =
              colors[Math.floor(Math.random() * colors.length)];
            confetti.style.width = Math.random() * 10 + 5 + "px";
            confetti.style.height = confetti.style.width;
            confetti.style.borderRadius = Math.random() > 0.5 ? "50%" : "0";

            document.body.appendChild(confetti);

            // Remove after animation
            setTimeout(() => confetti.remove(), 3000);
          }, i * 30);
        }
      }

      // ========================================
      // CELEBRATION EFFECTS
      // ========================================
      function celebrateSuccess() {
        // Add pulsing animation to success view
        const card = document.querySelector(".valentine-card");
        card.style.animation = "none";
        setTimeout(() => {
          card.style.animation = "heartBeat 1s ease-in-out 3";
        }, 100);
      }

      // ========================================
      // RESPONSIVE IMAGE ERROR HANDLING
      // ========================================
      valentineImage.addEventListener("error", function () {
        // Fallback to a solid color background if image fails to load
        this.style.background = "linear-gradient(135deg, #ff69b4, #ff1493)";
        this.alt = "💕";
      });

      // ========================================
      // INITIAL ANIMATIONS
      // ========================================
      window.addEventListener("load", function () {
        // Add entrance animation to card
        const card = document.querySelector(".valentine-card");
        card.style.animation = "fadeIn 1s ease";
      });
    </script>
  </body>
</html>
